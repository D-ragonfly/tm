<!DOCTYPE html>
<html>
  <head>
    <title>Game Tasks</title>
    <style>
      body { font-family: Arial; text-align: center; margin-top: 50px; }
      h1 { color: #333; }

      .task-box {
        display: inline-block;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        margin-top: 10px;
        width: 300px;
      }

      input {
        padding: 8px;
        margin: 5px;
        width: 90%;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
        margin-top: 10px;
      }

      #part2 {
        display: none;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px dashed #aaa;
      }

      #result {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Today's Task</h1>

    <div class="task-box">

      <!-- PART 1 -->
      <div id="part1">
        <p><b>Enter your name and a letter:</b></p>

        <input type="text" id="nameInput" placeholder="Your name" />
        <input type="text" id="letterInput" placeholder="A letter" maxlength="1" />

        <button onclick="submitPart1()">Submit</button>

        <div id="result"></div>
      </div>

      <!-- PART 2 (hidden initially, no headline) -->
      <div id="part2">
        <p><b>Now complete the next step:</b></p>
        <p id="dynamicTask"></p>
      </div>

    </div>

    <script>
      function submitPart1() {
        const name = document.getElementById("nameInput").value.trim();
        const letter = document.getElementById("letterInput").value.trim();

        if (!name) {
          document.getElementById("result").innerText = "Please enter your name.";
          return;
        }

        if (!letter.match(/^[a-zA-Z]$/)) {
          document.getElementById("result").innerText = "Please enter a single letter.";
          return;
        }

        document.getElementById("result").innerText =
          "Welcome " + name + "!";

        // unlock Part 2
        document.getElementById("part2").style.display = "block";

        // optional: use their input in Part 2
        document.getElementById("dynamicTask").innerText =
          "Find 3 words that start with the letter '" + letter.toUpperCase() + "'.";
      }
    </script>

  </body>
</html>
