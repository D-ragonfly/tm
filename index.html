<!DOCTYPE html>
<html>
  <head>
    <title>Game Tasks</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }

      h1 {
        color: #333;
      }

      .task-box {
        display: inline-block;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        margin-top: 10px;
        width: 350px;
      }

      input {
        padding: 8px;
        margin: 5px;
        width: 120px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
        margin-top: 10px;
      }

      #result {
        margin-top: 10px;
        font-weight: bold;
      }

      #task2 {
        display: none;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 2px dashed #aaa;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <h1>Today's Tasks</h1>

    <div class="task-box">

      <!-- TASK 1 -->
      <p><b>Task 1</b></p>
      <p>Please type your name and choose a letter of the alphabet.</p>

      <label>Name:</label>
      <input type="text" id="nameInput" />

      <label>Letter:</label>
      <input type="text" id="letterInput" maxlength="1" />

      <br>

      <button onclick="submitTask1()">Submit</button>

      <div id="result"></div>

      <!-- TASK 2 (hidden initially) -->
      <div id="task2">
        <p><b>Task 2:</b></p>
        <p>You need to record yourself doing......</p>

        <p id="dynamicTask"></p>
      </div>

    </div>

    <script>
      function submitTask1() {
        const name = document.getElementById("nameInput").value.trim();
        const letter = document.getElementById("letterInput").value.trim();

        if (!name) {
          document.getElementById("result").innerText = "Please enter your name.";
          return;
        }

        if (!letter.match(/^[a-zA-Z]$/)) {
          document.getElementById("result").innerText = "Please enter a single letter.";
          return;
        }

        document.getElementById("result").innerText =
          "Thanks " + name + "! Task 2 unlocked.";

        // show Task 2
        document.getElementById("task2").style.display = "block";

        // optional dynamic content using letter
        document.getElementById("dynamicTask").innerText =
          "Start your recording with something related to the letter '" +
          letter.toUpperCase() +
          "'.";
      }
    </script>

  </body>
</html>
