<!DOCTYPE html>
<html>
  <head>
    <title>Game Tasks</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }

      h1 {
        color: #333;
      }

      .task-box {
        display: inline-block;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        margin-top: 10px;
        width: 520px;
        text-align: left;
      }

      .input-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }

      input {
        padding: 8px;
      }

      #nameInput {
        flex: 1;
      }

      #letterInput {
        width: 60px;
        text-align: center;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
        margin-top: 10px;
      }

      #task2 {
        display: none;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px dashed #aaa;
      }

      #task3 {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px dashed #aaa;
      }

      #result {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Today's Tasks</h1>

    <div class="task-box">

      <!-- TASK 1 -->
      <p><b>Task 1</b></p>
      <p>Please type your name and choose a letter of the alphabet.</p>

      <div class="input-row">
        <input type="text" id="nameInput" placeholder="Name" />
        <input type="text" id="letterInput" placeholder="A" maxlength="1" />
      </div>

      <button onclick="submitTask1()">Submit</button>

      <div id="result"></div>

      <!-- TASK 2 -->
      <div id="task2">
        <p><b>Task 2</b></p>
        <p>You need to record yourself doing something related to your chosen letter.</p>

        <button onclick="completeTask2()">I have completed Task 2</button>
      </div>

      <!-- TASK 3 (now static) -->
      <div id="task3">
        <p><b>Task 3</b></p>
        <p>Final reflection: explain what you did in Task 2 in one sentence.</p>
      </div>

    </div>

    <script>
      function submitTask1() {
        const name = document.getElementById("nameInput").value.trim();
        const letter = document.getElementById("letterInput").value.trim();

        if (!name) {
          document.getElementById("result").innerText = "Please enter your name.";
          return;
        }

        if (!letter.match(/^[a-zA-Z]$/)) {
          document.getElementById("result").innerText = "Please enter a single letter.";
          return;
        }

        document.getElementById("result").innerText =
          "Thanks " + name + "! Task 2 unlocked.";

        document.getElementById("task2").style.display = "block";
      }

      function completeTask2() {
        alert("Task 2 completed!");
      }
    </script>

  </body>
</html>
