<!DOCTYPE html>
<html>
  <head>
    <title>Game Tasks</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }

      h1 {
        color: #333;
      }

      .task-box {
        display: inline-block;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        margin-top: 10px;
        width: 380px;
        text-align: left;
      }

      input {
        padding: 8px;
        margin: 5px;
        width: 150px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
        margin-top: 10px;
      }

      #task2 {
        display: none;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px dashed #aaa;
      }

      #result {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Today's Tasks</h1>

    <div class="task-box">

      <!-- TASK 1 (always visible) -->
      <p><b>Task 1</b></p>
      <p>Please type your name and choose a letter of the alphabet.</p>

      <label>Name:</label>
      <input type="text" id="nameInput" />

      <label>Letter:</label>
      <input type="text" id="letterInput" maxlength="1" />

      <br>

      <button onclick="submitTask1()">Submit</button>

      <div id="result"></div>

      <!-- TASK 2 (hidden until Task 1 complete) -->
      <div id="task2">
        <p><b>Task 2</b></p>
        <p>You need to record yourself doing something related to your chosen letter.</p>

        <button onclick="completeTask2()">I have completed Task 2</button>
      </div>

      <!-- TASK 3 (always visible) -->
      <div id="task3">
        <p><b>Task 3</b></p>
        <p>Final reflection: write one sentence about what you did.</p>

        <input type="text" id="task3Input" placeholder="Your answer..." />
        <button onclick="submitTask3()">Submit Task 3</button>

        <div id="task3Result"></div>
      </div>

    </div>

    <script>
      function submitTask1() {
        const name = document.getElementById("nameInput").value.trim();
        const letter = document.getElementById("letterInput").value.trim();

        if (!name) {
          document.getElementById("result").innerText = "Please enter your name.";
          return;
        }

        if (!letter.match(/^[a-zA-Z]$/)) {
          document.getElementById("result").innerText = "Please enter a single letter.";
          return;
        }

        document.getElementById("result").innerText =
          "Thanks " + name + "! Task 2 is now unlocked.";

        // unlock Task 2 only
        document.getElementById("task2").style.display = "block";
      }

      function completeTask2() {
        alert("Task 2 marked as complete!");
      }

      function submitTask3() {
        const answer = document.getElementById("task3Input").value.trim();

        if (!answer) {
          document.getElementById("task3Result").innerText =
            "Please enter your reflection.";
          return;
        }

        document.getElementById("task3Result").innerText =
          "Task 3 submitted successfully 🎉";
      }
    </script>

  </body>
</html>
