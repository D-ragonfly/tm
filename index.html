<!DOCTYPE html>
<html>
  <head>
    <title>Game Tasks</title>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

      body {
        font-family: "Inter", Arial, sans-serif;
        background: #f6f7fb;
        text-align: center;
        margin: 0;
        padding: 50px 20px;
        color: #1f2937;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 25px;
      }

      .task-box {
        display: inline-block;
        background: #ffffff;
        padding: 24px;
        border-radius: 14px;
        width: 540px;
        text-align: left;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      }

      p {
        margin: 8px 0;
        line-height: 1.4;
      }

      .task-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .input-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        margin-bottom: 10px;
      }

      label {
        font-weight: 600;
        font-size: 14px;
      }

      input {
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border 0.2s ease;
      }

      input:focus {
        border-color: #6366f1;
      }

      #nameInput {
        flex: 1;
      }

      #letterInput {
        width: 60px;
        text-align: center;
      }

      button {
        margin-top: 10px;
        padding: 10px 14px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button:hover {
        background: #4f46e5;
      }

      #task2 {
        display: none;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid #e5e7eb;
      }

      #task3 {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid #e5e7eb;
      }

      #result {
        margin-top: 10px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <h1>Today's Tasks</h1>

    <div class="task-box">

      <!-- TASK 1 -->
      <div class="task-title">Task 1</div>
      <p>Please type your name and choose a letter of the alphabet.</p>

      <div class="input-row">
        <label for="nameInput">Name:</label>
        <input type="text" id="nameInput" placeholder="Enter name" />

        <label for="letterInput">Letter:</label>
        <input type="text" id="letterInput" placeholder="A" maxlength="1" />
      </div>

      <button onclick="submitTask1()">Submit</button>

      <div id="result"></div>

      <!-- TASK 2 -->
      <div id="task2">
        <div class="task-title">Task 2</div>
        <p>You need to record yourself doing something related to your chosen letter.</p>
      </div>

      <!-- TASK 3 -->
      <div id="task3">
        <div class="task-title">Task 3</div>
        <p>Final reflection: explain what you did in Task 2 in one sentence.</p>
      </div>

    </div>

    <script>
      function submitTask1() {
        const name = document.getElementById("nameInput").value.trim();
        const letter = document.getElementById("letterInput").value.trim();

        if (!name) {
          document.getElementById("result").innerText =
            "Please enter your name.";
          return;
        }

        if (!letter.match(/^[a-zA-Z]$/)) {
          document.getElementById("result").innerText =
            "Please enter a single letter.";
          return;
        }

        document.getElementById("result").innerText =
          "Thanks " + name + "! Task 2 unlocked.";

        document.getElementById("task2").style.display = "block";
      }
    </script>

  </body>
</html>
